name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.12.0, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check

  desktop-package:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run desktop:smoke -- --user-data-dir="${RUNNER_TEMP}/marketing-research-companion-${GITHUB_RUN_ID}-${GITHUB_JOB}"
      - run: npm run desktop:build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: marketing-research-companion-macos-arm64-unsigned
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
